version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ohmitex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_NAME=Ohmitex Smart Controls Ltd
      - NEXT_PUBLIC_BASE_URL=http://localhost:3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ohmitex
      - JWT_SECRET=your-secret-key-change-in-production-min-32-chars
      - JWT_EXPIRES_IN=7d
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET=ohmitex
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin123
      - S3_REGION=us-east-1
      - S3_PUBLIC_URL=http://localhost:9000/ohmitex
      - SEED_ADMIN_EMAIL=admin@ohmitex.local
      - SEED_ADMIN_PASSWORD=Admin!23456
    command: >
      sh -c "
        npx prisma db push --accept-data-loss &&
        npx prisma db seed &&
        node server.js
      "

volumes:
  postgres_data:
  minio_data:
